<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — CodeArena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="page-shell">
  <nav class="navbar" id="navbar"></nav>

  <main class="main-content">
    <div class="container">
      <div class="form-card">
        <div class="eyebrow">Welcome back</div>
        <h2>Log in</h2>

        <div class="error-banner" id="errorBanner"></div>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Log in</button>
        </form>

        <div class="form-footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  renderNavbar();
  redirectIfLoggedIn();

  const form = document.getElementById("loginForm");
  const errorBanner = document.getElementById("errorBanner");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBanner.classList.remove("visible");
    submitBtn.disabled = true;
    submitBtn.textContent = "Logging in...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const data = await apiFetch("/login", {
        method: "POST",
        body: JSON.stringify({ email, password })
      });

      saveSession(data.token, data.user);
      window.location.href = "problems.html";

    } catch (err) {
      errorBanner.textContent = err.message;
      errorBanner.classList.add("visible");
      submitBtn.disabled = false;
      submitBtn.textContent = "Log in";
    }
  });
</script>
</body>
</html>
