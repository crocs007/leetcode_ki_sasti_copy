<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Problems — CodeArena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="page-shell">
  <nav class="navbar" id="navbar"></nav>

  <main class="main-content">
    <div class="container">
      <div class="list-header">
        <div>
          <div class="eyebrow" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">Problem set</div>
          <h2 style="margin:0;">All problems</h2>
        </div>
        <a href="create-problem.html" class="btn btn-ghost" id="newProblemBtn" style="display:none;">+ New problem</a>
      </div>

      <div id="listContainer">
        <div class="state-block">
          <div class="eyebrow">Loading</div>
          Fetching problems...
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();
  renderNavbar();

  if (isAdmin()) {
    document.getElementById("newProblemBtn").style.display = "inline-flex";
  }

  const difficultyClass = {
    Easy: "pill-easy",
    Medium: "pill-medium",
    Hard: "pill-hard"
  };

  async function loadProblems() {
    const container = document.getElementById("listContainer");
    try {
      const data = await apiFetch("/", {}, "problem");
      const problems = data.problems || [];

      if (problems.length === 0) {
        container.innerHTML = `
          <div class="state-block">
            <div class="eyebrow">Nothing here yet</div>
            No problems have been added. ${isAdmin() ? 'Create the first one to get started.' : 'Check back soon.'}
          </div>
        `;
        return;
      }

      container.innerHTML = problems.map((p, i) => `
        <a href="problem.html?id=${p._id}" class="problem-row">
          <div style="display:flex;align-items:center;gap:16px;">
            <span class="problem-index">${String(i + 1).padStart(2, "0")}</span>
            <span class="problem-row-title">${escapeHtml(p.title)}</span>
          </div>
          <div class="problem-row-meta">
            <span class="pill ${difficultyClass[p.difficulty] || 'pill-medium'}">${p.difficulty}</span>
          </div>
        </a>
      `).join("");

    } catch (err) {
      container.innerHTML = `
        <div class="state-block">
          <div class="eyebrow">Couldn't load problems</div>
          ${escapeHtml(err.message)}
        </div>
      `;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  loadProblems();
</script>
</body>
</html>
